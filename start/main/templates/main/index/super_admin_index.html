{% extends "main/base.html" %}
{% load static %}

{% block title %}Home{% endblock title %}

{% block content %}
<div class="home">
    <h2 class="section-title text-center mb-5">Управление Кофейнями</h2>
    <div class="cafes-grid">
        {% for cafe in cafes %}
            <a href="{% url 'main:workers' cafe.slug %}" class="cafe-card">
                <h3 class="cafe-name-a">{{ cafe.name }}</h3>
                <div class="btn-enter">Открыть <i class="bi bi-gear-fill"></i></div>
            </a>
        {% endfor %}
    </div>
</div>
{% endblock content %}
